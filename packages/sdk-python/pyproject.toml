[project]
name = "bimpeai"
version = "0.1.0"
description = "Official Python SDK for the BimpeAI Agent Console API"
readme = "README.md"
license = "MIT"
requires-python = ">=3.10"
authors = [{ name = "BimpeAI" }]
dependencies = [
    "httpx>=0.28",
    "pydantic>=2.9",
    "typing-extensions>=4.12",
]
classifiers = [
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Programming Language :: Python :: 3.14",
    "Typing :: Typed",
]

[project.urls]
Repository = "https://github.com/BimpeAI/bimpe-sdk"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/bimpeai"]

[dependency-groups]
dev = [
    "ruff>=0.15",
    "pyright>=1.1.400",
    "pytest>=9",
    "pytest-asyncio>=1",
    "respx>=0.22",
]

[tool.ruff]
line-length = 100
target-version = "py310"
src = ["src", "tests"]

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B", "ASYNC"]

[tool.pyright]
include = ["src", "tests", "examples"]
pythonVersion = "3.10"
typeCheckingMode = "strict"
venvPath = "."
venv = ".venv"

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]
