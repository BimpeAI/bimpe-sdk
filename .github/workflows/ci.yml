name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  lint-typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with: { version: 11 }
      - uses: actions/setup-node@v4
        with: { node-version: '24', cache: 'pnpm' }
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint
      - run: pnpm typecheck

  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node: ['24', '26']
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with: { version: 11 }
      - uses: actions/setup-node@v4
        with: { node-version: '${{ matrix.node }}', cache: 'pnpm' }
      - run: pnpm install --frozen-lockfile
      - run: pnpm test

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with: { version: 11 }
      - uses: actions/setup-node@v4
        with: { node-version: '24', cache: 'pnpm' }
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - run: pnpm --filter @bimpeai/examples-typescript typecheck
      - uses: actions/upload-artifact@v4
        with:
          name: sdk-dist
          path: packages/sdk-typescript/dist

  smoke-node:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with: { version: 11 }
      - uses: actions/setup-node@v4
        with: { node-version: '24', cache: 'pnpm' }
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @bimpeai/sdk build
      - run: node packages/sdk-typescript/tests/smoke/node.smoke.ts

  smoke-bun:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with: { version: 11 }
      - uses: actions/setup-node@v4
        with: { node-version: '24', cache: 'pnpm' }
      - uses: oven-sh/setup-bun@v2
        with: { bun-version: latest }
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @bimpeai/sdk build
      - run: bun run packages/sdk-typescript/tests/smoke/bun.smoke.ts

  smoke-deno:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with: { version: 11 }
      - uses: actions/setup-node@v4
        with: { node-version: '24', cache: 'pnpm' }
      - uses: denoland/setup-deno@v2
        with: { deno-version: v2.x }
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @bimpeai/sdk build
      - run: deno run --allow-net packages/sdk-typescript/tests/smoke/deno.smoke.ts
