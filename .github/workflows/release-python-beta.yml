name: Release Python (beta)

on:
  push:
    branches: [staging]

permissions:
  contents: read
  id-token: write

jobs:
  publish-beta:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/sdk-python
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v8
        with: { enable-cache: true }
      - run: uv sync
      - run: uv run ruff check src tests examples
      - run: uv run pyright
      - run: uv run pytest -q
      # Stamp a PEP 440 dev release from the base version (no commit), then build + publish.
      - run: uv version "$(uv version --short).dev${{ github.run_number }}"
      - run: uv build
      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: packages/sdk-python/dist
          skip-existing: true
